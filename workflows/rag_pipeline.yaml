main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: '${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}'
          - region: '${default(map.get(args, "region"), "us-west1")}'
          - corpus_id: '${default(map.get(args, "corpus_id"), "")}'
          - bucket_name: '${default(map.get(args, "bucket_name"), "")}'
          - repo_url: '${default(map.get(args, "repo_url"), "")}'
          - service_account: '${default(map.get(args, "service_account"), "")}'
          - build_id: ""
          - build_status: "WORKING"
          - poll_interval: 10
          - cb_base: "https://cloudbuild.googleapis.com/v1/projects"
          - ai_base: "-aiplatform.googleapis.com/v1beta1/projects"

    # 1. VALIDATE CORPUS ID
    # The corpus is created once by scripts/create_corpus.py and its ID is
    # passed via the scheduler (or manual trigger).  Fail fast if missing.
    - validate_corpus_id:
        switch:
          - condition: '${corpus_id != ""}'
            next: submit_build
        next: fail_missing_corpus_id
    - fail_missing_corpus_id:
        raise: "corpus_id is required. Run scripts/create_corpus.py and pass the ID via corpus.auto.tfvars or --data."

    # 2. CLOUD BUILD
    - submit_build:
        try:
          steps:
            - call_build:
                call: http.post
                args:
                  url: '${cb_base + "/" + project_id + "/locations/" + region + "/builds"}'
                  auth:
                    type: OAuth2
                  body:
                    serviceAccount: '${service_account}'
                    options:
                      logging: "CLOUD_LOGGING_ONLY"
                    source:
                      gitSource:
                        url: '${repo_url}'
                        revision: "refs/heads/main"
                    steps:
                      - id: clone-repos
                        name: gcr.io/cloud-builders/git
                        entrypoint: bash
                        args: ["-c", "chmod +x cloudbuild/scripts/clone_repos.sh && ./cloudbuild/scripts/clone_repos.sh"]
                      
                      - id: setup-venv
                        name: python:3.12-slim
                        entrypoint: bash
                        args: 
                          - "-c"
                          - "python3 -m venv /workspace/.venv && /workspace/.venv/bin/pip install requests beautifulsoup4 google-cloud-storage pyyaml"
                        waitFor: [clone-repos]

                      - id: discover-modules
                        name: python:3.12-slim
                        args: ["/workspace/.venv/bin/python3", "cloudbuild/scripts/discover_modules.py"]
                        waitFor: [setup-venv]

                      - id: clone-modules
                        name: gcr.io/cloud-builders/git
                        entrypoint: bash
                        args: ["-c", "mkdir -p /workspace/repos/modules && while read url; do git clone --depth 1 $url /workspace/repos/modules/$(basename $url .git); done < /workspace/module_repos.txt"]
                        waitFor: [discover-modules]

                      - id: process-docs
                        name: python:3.12-slim
                        args: ["/workspace/.venv/bin/python3", "cloudbuild/scripts/process_docs.py"]
                        waitFor: [clone-repos, clone-modules, setup-venv]

                      - id: fetch-github-issues
                        name: python:3.12-slim
                        args: ["/workspace/.venv/bin/python3", "cloudbuild/scripts/fetch_github_issues.py"]
                        waitFor: [setup-venv]

                      - id: fetch-discuss
                        name: python:3.12-slim
                        args: ["/workspace/.venv/bin/python3", "cloudbuild/scripts/fetch_discuss.py"]
                        waitFor: [setup-venv]

                      - id: fetch-blogs
                        name: python:3.12-slim
                        args: ["/workspace/.venv/bin/python3", "cloudbuild/scripts/fetch_blogs.py"]
                        waitFor: [setup-venv]

                      - id: deduplicate
                        name: python:3.12-slim
                        args: ["/workspace/.venv/bin/python3", "cloudbuild/scripts/deduplicate.py"]
                        waitFor: [process-docs, fetch-github-issues, fetch-discuss, fetch-blogs]

                      - id: generate-metadata
                        name: python:3.12-slim
                        args: ["/workspace/.venv/bin/python3", "cloudbuild/scripts/generate_metadata.py", "--bucket", '${bucket_name}']
                        waitFor: [deduplicate]

                      - id: upload-to-gcs
                        name: gcr.io/cloud-builders/gsutil
                        args: ["-m", "rsync", "-r", "-d", "/workspace/cleaned/", '${"gs://" + bucket_name + "/"}']
                        waitFor: [generate-metadata]              
                result: build_res
            - set_build_id:
                assign:
                  - build_id: '${build_res.body.metadata.build.id}'
        except:
          as: e
          steps:
            - handle_build_error:
                raise: '${e}'

    # 3. POLL BUILD
    - poll_build:
        steps:
          - check_status:
              switch:
                - condition: '${build_status == "SUCCESS"}'
                  next: init_import
                - condition: '${build_status == "FAILURE" OR build_status == "CANCELLED" OR build_status == "TIMEOUT"}'
                  raise: '${"Build Failed: " + build_status}'
          - wait_interval:
              call: sys.sleep
              args:
                seconds: '${poll_interval}'
          - apply_backoff:
              assign:
                - poll_interval: '${math.min(poll_interval * 1.5, 60)}'
          - get_status:
              call: http.get
              args:
                url: '${cb_base + "/" + project_id + "/locations/" + region + "/builds/" + build_id}'
                auth:
                  type: OAuth2
              result: poll_res
          - update_status:
              assign:
                - build_status: '${poll_res.body.status}'
          - loop_poll:
              next: check_status

    # 4. RAG IMPORT — batched by content prefix (API limit: 10 000 files per call)
    - init_import:
        assign:
          - import_base_url: '${"https://" + region + ai_base + "/" + project_id + "/locations/" + region + "/ragCorpora/" + corpus_id + "/ragFiles:import"}'
          - import_batches_done: 0
    - import_batches:
        for:
          value: prefix
          in:
            - "blog/"
            - "documentation/boundary/"
            - "documentation/consul/"
            - "documentation/hcp-terraform/"
            - "documentation/nomad/"
            - "documentation/packer/"
            - "documentation/terraform/"
            - "documentation/vault/"
            - "issues/"
            - "provider/"
            - "sentinel/"
          steps:
            - start_batch_import:
                call: http.post
                args:
                  url: '${import_base_url}'
                  auth:
                    type: OAuth2
                  body:
                    importRagFilesConfig:
                      gcsSource:
                        uris: ['${"gs://" + bucket_name + "/" + prefix}']
                      ragFileTransformationConfig:
                        ragFileChunkingConfig:
                          fixedLengthChunking:
                            chunkSize: 1024
                            chunkOverlap: 20
                result: import_op
            - await_batch:
                call: await_import_op
                args:
                  region: '${region}'
                  op_name: '${import_op.body.name}'
                result: final_op
            - log_batch:
                call: sys.log
                args:
                  text: '${"Import batch done: " + prefix}'
                  severity: INFO
            - count_batch:
                assign:
                  - import_batches_done: '${import_batches_done + 1}'
    - log_import_summary:
        call: sys.log
        args:
          text: '${"All " + string(import_batches_done) + " import batches completed"}'
          severity: INFO

    # 5. VALIDATION
    - validate_retrieval:
        assign:
          - retrieve_url: '${"https://" + region + ai_base + "/" + project_id + "/locations/" + region + ":retrieveContexts"}'
          - corpus_resource: '${"projects/" + project_id + "/locations/" + region + "/ragCorpora/" + corpus_id}'
          - queries_passed: 0
    - run_parallel_validation:
        parallel:
          shared: [queries_passed]
          for:
            value: vq
            in: 
              - {topic: "terraform", query: "AWS provider setup"}
              - {topic: "vault", query: "Transit engine keys"}
              - {topic: "consul", query: "Service mesh intentions"}
              - {topic: "nomad", query: "Job spec syntax"}
              - {topic: "packer", query: "HCL2 build block"}
              - {topic: "boundary", query: "OIDC auth method"}
            steps:
              - run_query:
                  try:
                    call: http.post
                    args:
                      url: '${retrieve_url}'
                      auth:
                        type: OAuth2
                      body:
                        vertex_rag_store:
                          rag_resources:
                            - rag_corpus: '${corpus_resource}'
                          vector_distance_threshold: 0.35
                        query:
                          text: '${vq.query}'
                          similarity_top_k: 1
                    result: r
                  # FIX: Native Workflows exponential backoff for 503/429 errors
                  retry:
                    predicate: ${http.default_retry_predicate}
                    max_retries: 5
                    backoff:
                      initial_delay: 2
                      max_delay: 32
                      multiplier: 2
              - evaluate_result:
                  switch:
                    - condition: '${"contexts" in r.body AND "contexts" in r.body.contexts AND len(r.body.contexts.contexts) > 0 AND r.body.contexts.contexts[0].distance < 0.3}'
                      assign:
                        - queries_passed: '${queries_passed + 1}'

    # 6. CACHE WARMING
    - warm_cache:
        call: http.post
        args:
          url: '${"https://" + region + ai_base + "/" + project_id + "/locations/" + region + ":retrieveContexts"}'
          auth:
            type: OAuth2
          body:
            vertex_rag_store:
              rag_resources:
                - rag_corpus: '${"projects/" + project_id + "/locations/" + region + "/ragCorpora/" + corpus_id}'
            query:
              text: "HashiCorp product ecosystem overview"
              similarity_top_k: 5

    - finish_pipeline:
        call: sys.log
        args:
          text: '${"Pipeline Complete. Queries Passed: " + string(queries_passed)}'
          severity: INFO

# ── Subworkflow: poll a Vertex AI LRO until done ──────────────────────────────
await_import_op:
  params: [region, op_name]
  steps:
    - init_poll:
        assign:
          - poll_interval: 15
          - poll_count: 0
          - max_polls: 80
          - op_url: '${"https://" + region + "-aiplatform.googleapis.com/v1beta1/" + op_name}'
    - poll_loop:
        steps:
          - get_op:
              call: http.get
              args:
                url: '${op_url}'
                auth:
                  type: OAuth2
              result: op_resp
          - check_done:
              switch:
                - condition: '${default(map.get(op_resp.body, "done"), false) == true}'
                  next: check_error
                - condition: '${poll_count >= max_polls}'
                  raise: '${"Import LRO timed out after " + string(poll_count) + " polls: " + op_name}'
          - wait:
              call: sys.sleep
              args:
                seconds: '${poll_interval}'
          - increment:
              assign:
                - poll_count: '${poll_count + 1}'
                - poll_interval: '${math.min(poll_interval * 1.5, 60)}'
          - loop:
              next: get_op
    - check_error:
        switch:
          - condition: '${"error" in op_resp.body}'
            raise: '${"Import failed (" + op_name + "): code=" + string(op_resp.body.error.code) + " " + op_resp.body.error.message}'
    - return_result:
        return: '${op_resp.body}'