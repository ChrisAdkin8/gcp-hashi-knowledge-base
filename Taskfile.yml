version: "3"

vars:
  TF_DIR: terraform
  TF: 'terraform -chdir={{.TF_DIR}}'
  PYTHON: .venv/bin/python3
  PROJECT_ID:
    sh: '{{if .PROJECT_ID}}echo "{{.PROJECT_ID}}"{{else}}gcloud config get-value project 2>/dev/null{{end}}'
  REGION: '{{.REGION | default "us-west1"}}'
  STATE_BUCKET:
    sh: 'echo "{{.PROJECT_ID}}-tf-state-$(echo -n "{{.PROJECT_ID}}" | sha256sum | cut -c1-8)"'
  DISTANCE_THRESHOLD: '{{.DISTANCE_THRESHOLD | default "0.35"}}'

tasks:

  default:
    silent: true
    cmds: [task --list]

  # ── Auth ───────────────────────────────────────────────────────────

  login:
    desc: Authenticate gcloud + ADC and set active project
    preconditions: &gcp
      - sh: test -n "{{.PROJECT_ID}}"
        msg: "No active gcloud project. Run 'gcloud config set project <id>' or pass PROJECT_ID=<id>."
    cmds:
      - gcloud auth login
      - gcloud auth application-default login
      - gcloud config set project {{.PROJECT_ID}}
      - gcloud services enable serviceusage.googleapis.com --project={{.PROJECT_ID}}

  # ── Entrypoint ─────────────────────────────────────────────────────

  up:
    desc: "Full deploy: preflight → bootstrap → apply → pipeline"
    preconditions: *gcp
    requires: { vars: [REPO_URI] }
    cmds:
      - task: preflight
      - scripts/deploy.sh --project-id {{.PROJECT_ID}} --region {{.REGION}} --repo-uri {{.REPO_URI}} {{if eq .SKIP_PIPELINE "true"}}--skip-pipeline{{end}}

  bootstrap:
    desc: Create GCS state bucket and init remote backend
    preconditions: *gcp
    cmds: ['scripts/bootstrap_state.sh --project-id {{.PROJECT_ID}} --region {{.REGION}}']

  # ── Terraform ──────────────────────────────────────────────────────

  fmt:
    desc: Format Terraform files
    cmds: ['{{.TF}} fmt -recursive']

  fmt:check:
    desc: Check Terraform formatting (CI)
    cmds: ['{{.TF}} fmt -check -recursive']

  init:
    desc: Initialise Terraform
    preconditions: *gcp
    cmds: ['{{.TF}} init -backend-config=bucket={{.STATE_BUCKET}} -input=false']
    status: ['test -f {{.TF_DIR}}/.terraform.lock.hcl']

  init:upgrade:
    desc: Re-initialise and upgrade providers
    preconditions: *gcp
    cmds: ['{{.TF}} init -backend-config=bucket={{.STATE_BUCKET}} -input=false -upgrade']

  validate:
    desc: Run terraform validate
    deps: [init]
    cmds: ['{{.TF}} validate']

  plan:
    desc: Plan and save to tfplan
    deps: [init]
    cmds: ['{{.TF}} plan -input=false -out=tfplan']

  apply:
    desc: Plan then apply
    deps: [plan]
    prompt: "Apply terraform plan to {{.PROJECT_ID}}?"
    cmds: ['{{.TF}} apply tfplan']

  destroy:
    desc: Destroy all infrastructure
    deps: [init]
    prompt: "Destroy ALL infrastructure in {{.PROJECT_ID}}? Irreversible."
    silent: true
    cmds:
      - |
        set -euo pipefail
        # Disable Spanner deletion protection if the resource exists in state
        if {{.TF}} state list 2>/dev/null | grep -q 'google_spanner_database.graph'; then
          {{.TF}} apply -auto-approve -input=false \
            -target='module.terraform_graph_store[0].google_spanner_database.graph' \
            -var='spanner_database_deletion_protection=false'
        fi
        # Empty GCS buckets so destroy can remove them
        for addr in module.hashicorp_docs_pipeline.google_storage_bucket.rag_docs \
                    'module.terraform_graph_store[0].google_storage_bucket.graph_staging'; do
          name=$({{.TF}} state show "$addr" 2>/dev/null | sed -n 's/.*name *= *"\(.*\)"/\1/p' | head -1)
          [[ -n "$name" ]] && gcloud storage rm --recursive "gs://$name/**" 2>/dev/null || true
        done
        {{.TF}} destroy -auto-approve -input=false

  output:
    desc: Show Terraform outputs
    deps: [init]
    cmds: ['{{.TF}} output']

  # ── Docs pipeline (Vertex AI RAG) ─────────────────────────────────

  corpus:create:
    desc: Create (or find) the RAG corpus and write corpus.auto.tfvars
    preconditions: *gcp
    silent: true
    cmds:
      - |
        CORPUS_ID=$({{.PYTHON}} scripts/create_corpus.py \
          --project-id {{.PROJECT_ID}} --region {{.REGION}} --output-id-only)
        [[ -n "$CORPUS_ID" ]] || { echo "ERROR: failed to create/find corpus"; exit 1; }
        echo "corpus_id = \"${CORPUS_ID}\"" > {{.TF_DIR}}/corpus.auto.tfvars
        echo "Corpus ID ${CORPUS_ID} → {{.TF_DIR}}/corpus.auto.tfvars"

  docs:populate:
    desc: "Create corpus (if needed), trigger RAG ingestion, and wait"
    preconditions: *gcp
    cmds:
      - task: corpus:create
      - task: docs:run

  docs:run:
    desc: Trigger docs pipeline (RAG ingestion) and wait
    preconditions: *gcp
    silent: true
    deps: [init]
    vars:
      CORPUS_ID:  { sh: '{{.TF}} output -raw corpus_id 2>/dev/null' }
      RAG_BUCKET: { sh: '{{.TF}} output -raw gcs_bucket_name 2>/dev/null' }
      SA_EMAIL:   { sh: '{{.TF}} output -raw service_account_email 2>/dev/null' }
      REPO_URI:   { sh: 'grep cloudbuild_repo_uri {{.TF_DIR}}/terraform.tfvars 2>/dev/null | cut -d\" -f2' }
    cmds:
      - |
        SA="projects/{{.PROJECT_ID}}/serviceAccounts/{{.SA_EMAIL}}"
        DATA=$({{.PYTHON}} -c "import json; print(json.dumps({
          'corpus_id':'{{.CORPUS_ID}}','bucket_name':'{{.RAG_BUCKET}}',
          'region':'{{.REGION}}','repo_url':'{{.REPO_URI}}','service_account':'${SA}'}))")
        scripts/run_pipeline.sh --region {{.REGION}} --wait --data "$DATA"

  docs:test:
    desc: Retrieval quality tests against Vertex AI corpus
    preconditions: *gcp
    requires: { vars: [CORPUS_ID] }
    cmds:
      - '{{.PYTHON}} scripts/test_retrieval.py --project-id {{.PROJECT_ID}} --region {{.REGION}} --corpus-id {{.CORPUS_ID}} --distance-threshold {{.DISTANCE_THRESHOLD}}'

  bucket:report:
    desc: File counts per subfolder in RAG docs bucket
    preconditions: *gcp
    silent: true
    deps: [init]
    vars:
      RAG_BUCKET: { sh: '{{.TF}} output -raw gcs_bucket_name 2>/dev/null' }
    cmds:
      - |
        bucket="gs://{{.RAG_BUCKET}}"
        printf "Bucket: %s\n\n%-40s %s\n%s\n" "$bucket" "Folder" "Files" "$(printf '─%.0s' {1..49})"
        total=0
        for folder in $(gcloud storage ls "$bucket/"); do
          name="${folder#${bucket}/}"
          [[ "$name" != */ ]] && { printf "%-40s %6s\n" "$name" "—"; total=$((total+1)); continue; }
          count=$(gcloud storage ls --recursive "${folder}**" 2>/dev/null | grep -cv '/$')
          printf "%-40s %6d\n" "$name" "$count"; total=$((total+count))
          for sub in $(gcloud storage ls "$folder"); do
            printf "  %-38s %6d\n" "${sub#${bucket}/}" \
              "$(gcloud storage ls --recursive "${sub}**" 2>/dev/null | grep -cv '/$')"
          done
        done
        printf "\n%-40s %6d\n" "TOTAL" "$total"

  # ── Graph pipeline (Spanner) ───────────────────────────────────────

  graph:populate:
    desc: Trigger graph pipeline (terraform graph → Spanner) and wait
    preconditions: *gcp
    deps: [init]
    cmds: ['scripts/run_graph_pipeline.sh --project-id {{.PROJECT_ID}} --region {{.REGION}} --wait']

  graph:test:
    desc: Smoke-test Spanner graph (Resource / DependsOn counts)
    preconditions: *gcp
    deps: [init]
    cmds: ['scripts/test_graph.sh --project-id {{.PROJECT_ID}}']

  graph:status:
    desc: Last 5 graph pipeline executions
    preconditions: *gcp
    silent: true
    deps: [init]
    vars:
      WORKFLOW: { sh: '{{.TF}} output -raw graph_workflow_name 2>/dev/null' }
    cmds:
      - |
        [[ -n "{{.WORKFLOW}}" && "{{.WORKFLOW}}" != "null" ]] \
          || { echo "graph_workflow_name is null. Set create_graph_store=true and apply."; exit 1; }
        gcloud workflows executions list "{{.WORKFLOW}}" \
          --project={{.PROJECT_ID}} --location={{.REGION}} --limit=5 \
          --format="table(name.basename(),state,startTime,endTime)"

  # ── Test ───────────────────────────────────────────────────────────

  test:
    desc: Python unit tests (pytest)
    cmds:
      - |
        [[ -d cloudbuild/scripts/tests ]] || { echo "No tests yet."; exit 0; }
        PY="{{.PYTHON}}"; [[ -x "$PY" ]] || PY="$(command -v python3)"
        "$PY" -m pytest cloudbuild/scripts/tests -v

  test:token-efficiency:
    desc: "Compare retrieval token cost (MODE: rag|graph|combined|all)"
    silent: true
    deps: [init]
    vars:
      CORPUS_ID:
        sh: '{{.TF}} output -raw corpus_id 2>/dev/null || sed -n ''s/^corpus_id *= *"\([^"]*\)"/\1/p'' {{.TF_DIR}}/corpus.auto.tfvars 2>/dev/null || echo ""'
    cmds:
      - |
        set -euo pipefail
        MODE="{{.MODE | default "all"}}"
        tf_out() { {{.TF}} output -raw "$1" 2>/dev/null || true; }
        case "$MODE" in rag|graph|combined|all) ;; *) echo "Error: MODE must be rag|graph|combined|all"; exit 1;; esac

        ARGS="--project-id {{.PROJECT_ID}} --region {{.REGION}} --mode $MODE --distance-threshold {{.DISTANCE_THRESHOLD}}"
        [[ ! "$MODE" =~ ^(rag|combined|all)$ ]] || {
          [[ -n "{{.CORPUS_ID}}" ]] || { echo "Error: CORPUS_ID unresolved. Run 'task corpus:create'."; exit 1; }
          ARGS+=" --corpus-id {{.CORPUS_ID}}"
        }
        [[ ! "$MODE" =~ ^(graph|combined|all)$ ]] || {
          SI=$(tf_out spanner_instance_name); SD=$(tf_out spanner_database_name)
          [[ -n "$SI" && -n "$SD" ]] || { echo "Error: Spanner required for mode '$MODE'."; exit 1; }
          ARGS+=" --spanner-instance $SI --spanner-database $SD"
        }
        {{.PYTHON}} scripts/test_token_efficiency.py $ARGS

  # ── Preflight ──────────────────────────────────────────────────────

  preflight:
    desc: All preflight checks (tools, auth, IAM, Python, files, Terraform)
    cmds: ['scripts/preflight.sh {{.REGION}} {{.PYTHON}} {{.TF_DIR}}']

  # ── Claude Code ────────────────────────────────────────────────────

  claude:setup:
    desc: Configure Claude Code for Vertex AI
    preconditions: *gcp
    vars:
      CLAUDE_REGION: '{{.CLAUDE_REGION | default "us-east5"}}'
      CLAUDE_MODEL: '{{.CLAUDE_MODEL | default "claude-sonnet-4-20250514"}}'
    cmds:
      - scripts/setup_claude_vertex.sh --project-id {{.PROJECT_ID}} --region {{.CLAUDE_REGION}} --model {{.CLAUDE_MODEL}} {{if eq .PERSIST "true"}}--persist{{end}}

  # ── MCP ────────────────────────────────────────────────────────────

  mcp:install:
    desc: Install MCP server dependencies
    cmds: ['{{.PYTHON}} -m pip install -r mcp/requirements.txt --quiet && echo "MCP dependencies installed."']

  mcp:setup:
    desc: Register MCP server with Claude Code
    preconditions: *gcp
    vars:
      CORPUS_ID:
        sh: '{{if .CORPUS_ID}}echo "{{.CORPUS_ID}}"{{else}}{{.TF}} output -raw corpus_id 2>/dev/null || echo ""{{end}}'
    cmds:
      - |
        [[ -n "{{.CORPUS_ID}}" ]] || { echo "ERROR: pass CORPUS_ID=<id>."; exit 1; }
        scripts/setup_mcp.sh --project-id {{.PROJECT_ID}} --region {{.REGION}} --corpus-id {{.CORPUS_ID}}

  mcp:test:
    desc: Smoke-test MCP server tools
    preconditions: *gcp
    requires: { vars: [CORPUS_ID] }
    vars:
      SPANNER_INSTANCE: { sh: '{{.TF}} output -raw spanner_instance_name 2>/dev/null | grep -v null || echo ""' }
      SPANNER_DATABASE: { sh: '{{.TF}} output -raw spanner_database_name 2>/dev/null | grep -v null || echo ""' }
    env:
      VERTEX_PROJECT: "{{.PROJECT_ID}}"
      VERTEX_REGION: "{{.REGION}}"
      VERTEX_CORPUS_ID: "{{.CORPUS_ID}}"
      SPANNER_INSTANCE: "{{.SPANNER_INSTANCE}}"
      SPANNER_DATABASE: "{{.SPANNER_DATABASE}}"
    cmds: ['{{.PYTHON}} mcp/test_server.py']

  # ── CI ─────────────────────────────────────────────────────────────

  shellcheck:
    desc: Lint shell scripts
    cmds:
      - |
        files=$(git ls-files 'scripts/*.sh' 'cloudbuild/scripts/*.sh' 2>/dev/null)
        : "${files:=$(ls scripts/*.sh cloudbuild/scripts/*.sh 2>/dev/null)}"
        [[ -n "$files" ]] && shellcheck $files || echo "No shell scripts found."

  ci:
    desc: All CI checks
    deps: [fmt:check, validate, shellcheck, test]
